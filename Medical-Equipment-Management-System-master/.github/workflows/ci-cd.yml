name: MediBridge CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: medibridge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Go dependencies
      working-directory: ./backend
      run: go mod download

    - name: Run Go tests
      working-directory: ./backend
      run: go test -v ./...
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/medibridge_test?sslmode=disable
        REDIS_URL: localhost:6379

    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm run lint

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Deploy to Azure Container Instances
      uses: azure/aci-deploy@v1
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        dns-name-label: medibridge-${{ github.sha }}
        location: 'eastus'
        containers: |
          [
            {
              "name": "medibridge-backend",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}",
              "ports": [{"port": 8080}],
              "environmentVariables": [
                {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"},
                {"name": "REDIS_URL", "value": "${{ secrets.REDIS_URL }}"},
                {"name": "GIN_MODE", "value": "release"}
              ]
            },
            {
              "name": "medibridge-frontend",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}",
              "ports": [{"port": 3000}],
              "environmentVariables": [
                {"name": "API_URL", "value": "http://localhost:8080"},
                {"name": "NEXT_PUBLIC_API_URL", "value": "https://medibridge-${{ github.sha }}.eastus.azurecontainer.io"}
              ]
            }
          ]

    - name: Update deployment status
      run: |
        echo "Deployment completed successfully!"
        echo "Frontend URL: https://medibridge-${{ github.sha }}.eastus.azurecontainer.io"
        echo "Backend URL: https://medibridge-${{ github.sha }}.eastus.azurecontainer.io:8080" 