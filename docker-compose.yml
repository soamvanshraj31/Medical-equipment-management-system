version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: medibridge-postgres
    environment:
      POSTGRES_DB: medibridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medibridge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: medibridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medibridge-network

  # GoLang Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medibridge-backend
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/medibridge?sslmode=disable
      REDIS_URL: redis:6379
      GIN_MODE: release
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - medibridge-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medibridge-frontend
    environment:
      API_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - medibridge-network
    restart: unless-stopped

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: medibridge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - medibridge-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  medibridge-network:
    driver: bridge 